services:
  http-server:
    container_name: http-server
    build:
      context: .
      dockerfile: docker/http/Dockerfile.server
    networks:
      - testnet
    ports:
      - "3000:3000"

  http-client:
    container_name: http-client
    build:
      context: .
      dockerfile: docker/http/Dockerfile.client
    networks:
      - testnet
    depends_on:
      - http-server
    environment:
      - TARGET=http-server:3000
    volumes:
      - ./data:/app/data

  websocket-server:
    container_name: websocket-server
    build:
      context: .
      dockerfile: docker/websocket/Dockerfile.server
    networks:
      - testnet
    ports:
      - "3000:3000"

  websocket-client:
    container_name: websocket-client
    build:
      context: .
      dockerfile: docker/websocket/Dockerfile.client
    networks:
      - testnet
    depends_on:
      - websocket-server
    environment:
      - TARGET=websocket-server:3000
    volumes:
      - ./data:/app/data

networks:
  testnet:
